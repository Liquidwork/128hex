<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>128-bit Hex → Bit Table</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div id="app">
    <div class="container">
      <h1>128-bit Hex → Bit Viewer</h1>

      <div class="input-area">
        <input v-model="hexInput" type="text" placeholder="Enter 32 hex digits (128 bits)" maxlength="32"
          autocomplete="off" />
        <div class="error">{{ errorMsg }}</div>
      </div>

      <table class="bit-table">
        <tbody>
          <template v-for="(row, rowIndex) in bitRows" :key="rowIndex">
            <tr v-if="rowIndex > 0" class="row-gap">
              <td :colspan="cols + 1"></td>
            </tr>
            <tr>
              <th>Bits</th>
              <th v-for="colIndex in cols" :key="`header-${rowIndex}-${colIndex}`">
                {{ 127 - (rowIndex * cols + colIndex - 1) }}
              </th>
            </tr>
            <tr>
              <th>{{ row.label }}</th>
              <td v-for="(bit, colIndex) in row.bits" :key="`bit-${rowIndex}-${colIndex}`"
                :class="bit === '1' ? 'bit-1' : 'bit-0'"
                :class.nibble-group="(colIndex + 1) % 4 === 0 && (colIndex + 1) % 8 !== 0 && colIndex + 1 !== cols"
                :class.byte-group="(colIndex + 1) % 8 === 0 && colIndex + 1 !== cols">
                {{ bit }}
              </td>
            </tr>
          </template>
        </tbody>
      </table>

      <div class="c-array-label">
        C array initializer (click to select):
        <select v-model="endian">
          <option value="little">Little-endian (x86)</option>
          <option value="big">Big-endian</option>
        </select>
      </div>
      <div class="c-array">{{ cArrayText }}</div>
    </div>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script>
    const { createApp } = Vue;
    const HEX_EXAMPLE = 'A5C3F00D1234567890ABCDEF01234567';

    createApp({
      data() {
        return {
          hexInput: this.getCookie('lastHexInput') ?? HEX_EXAMPLE,
          endian: this.getCookie('lastEndian') ?? 'little',
          lastValidHex: null,
          cols: 16,
          errorMsg: ''
        };
      },
      computed: {
        cleanHex() {
          let hex = this.hexInput.trim().replace(/\s+/g, '').toUpperCase();

          if (hex === '') {
            hex = '0';
          }

          if (!/^[0-9A-F]{1,32}$/.test(hex)) {
            this.errorMsg = 'Invalid hex: please use only 0-9 and A-F (max 32 characters)';
            if (this.lastValidHex !== null) {
              // If the current input is invalid, revert to the last valid hex value
              hex = this.lastValidHex;
            } else {
              hex = '0';
            }
          } else {
            this.errorMsg = '';
            this.lastValidHex = hex;
          }

          return hex.padStart(32, '0');
        },
        binary() {
          let binary = '';
          for (let char of this.cleanHex) {
            const nibble = parseInt(char, 16);
            binary += nibble.toString(2).padStart(4, '0');
          }
          return binary;
        },
        bitRows() {
          const rows = [];
          for (let r = 0; r < 8; r++) {
            const highBit = 127 - r * this.cols;
            const lowBit = highBit - this.cols + 1;
            const bits = [];
            for (let c = 0; c < this.cols; c++) {
              const bitIndex = r * this.cols + c;
              bits.push(this.binary[bitIndex]);
            }
            rows.push({
              label: highBit + '-' + lowBit,
              bits: bits
            });
          }
          return rows;
        },
        cArrayText() {
          const bytes = [];
          for (let i = 0; i < 32; i += 2) {
            bytes.push('0x' + this.cleanHex.slice(i, i + 2).toLowerCase());
          }
          if (this.endian === 'little') {
            bytes.reverse();
          }
          return '{' + bytes.join(', ') + '}';
        }
      },
      watch: {
        hexInput(newVal) {
          this.setCookie('lastHexInput', newVal, 30); // save for 30 days
        },
        endian(newVal) {
          this.setCookie('lastEndian', newVal, 30); // save for 30 days
        }
      },
      methods: {
        setCookie(name, value, days) {
          const d = new Date();
          d.setTime(d.getTime() + days * 24 * 60 * 60 * 1000);
          document.cookie = name + '=' + encodeURIComponent(value) + ';expires=' + d.toUTCString() + ';path=/;SameSite=Lax';
        },
        getCookie(name) {
          const prefix = name + '=';
          const parts = document.cookie.split(';');
          for (let p of parts) {
            p = p.trim();
            if (p.startsWith(prefix)) return decodeURIComponent(p.substring(prefix.length));
          }
          return null;
        }
      }
    }).mount('#app');
  </script>
</body>

</html>
