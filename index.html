<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>128-bit Hex → Bit Table</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div v-cloak id="app">
    <div class="container">
      <div style="text-align: right; margin-bottom: 1rem;">
        <button @click="toggleTheme"
          style="padding: 8px 16px; border: 1px solid var(--accent-primary); background: var(--bg-secondary); color: var(--text-primary); border-radius: 4px; cursor: pointer; font-size: 0.9rem;">
          {{ isDarkTheme ? '☀️ Light' : '🌙 Dark' }}
        </button>
      </div>
      <h1>128-bit Hex → Bit Viewer</h1>

      <div class="input-area">
        <div class="settings-row">
          <label for="bitWidth">Input bits:</label>
          <select id="bitWidth" v-model.number="bitWidth">
            <option :value="32">32</option>
            <option :value="64">64</option>
            <option :value="128">128</option>
          </select>
        </div>
        <div class="input-wrapper">
          <input v-model="hexInput" type="text" :placeholder="inputPlaceholder" :maxlength="hexLength"
            autocomplete="off" />
          <div class="input-overlay">
            <span v-for="(char, idx) in hexInput.toUpperCase()" :key="idx"
              :class="{ 'char-highlighted': hoveredCharIndex === idx + hexLength - hexInput.length }">
              {{ char }}
            </span>
          </div>
        </div>
        <div class="error">{{ errorMsg }}</div>
      </div>

      <table class="bit-table">
        <tbody>
          <template v-for="(row, rowIndex) in bitRows" :key="rowIndex">
            <tr v-if="rowIndex > 0" class="row-gap">
              <td :colspan="cols + 1"></td>
            </tr>
            <tr>
              <!-- Shit, colIndex starts from 1??? WTF -->
              <th v-for="colIndex in cols" :key="`header-${rowIndex}-${colIndex}`"
                @mouseover="hoveredCharIndex = Math.floor((rowIndex * cols + colIndex - 1) / 4)"
                @mouseleave="hoveredCharIndex = null"
                :class="{ 'index-hovered': hoveredCharIndex === Math.floor((rowIndex * cols + colIndex - 1) / 4) }">
                {{ (bitWidth - 1) - (rowIndex * cols + colIndex - 1) }}
              </th>
            </tr>
            <tr>
              <!-- This colIndex however, starts from 0. -->
              <td v-for="(bit, colIndex) in row.bits" :key="`bit-${rowIndex}-${colIndex}`" :class="[
                bit === '1' ? 'bit-1' : 'bit-0',
                {
                  'nibble-group': (colIndex + 1) % 4 === 0 && (colIndex + 1) % 8 !== 0 && (colIndex + 1) !== cols,
                  'byte-group':  (colIndex + 1) % 8 === 0  && (colIndex + 1) !== cols,
                  'bit-hovered': hoveredCharIndex === Math.floor((rowIndex * cols + colIndex) / 4)
                }
              ]" @mouseover="hoveredCharIndex = Math.floor((rowIndex * cols + colIndex) / 4)"
                @mouseleave="hoveredCharIndex = null">
                {{ bit }}
              </td>
            </tr>
          </template>
        </tbody>
      </table>

      <div class="c-array-label">
        C array initializer (click to select):
        <select v-model="endian">
          <option value="little">Little-endian (x86)</option>
          <option value="big">Big-endian</option>
        </select>
      </div>
      <div class="c-array">{{ cArrayText }}</div>
    </div>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script>
    const { createApp } = Vue;
    const HEX_EXAMPLE = 'A5C3F00D1234567890ABCDEF01234567';

    createApp({
      data() {
        return {
          hexInput: localStorage.getItem('lastHexInput') ?? HEX_EXAMPLE,
          endian: localStorage.getItem('lastEndian') ?? 'little',
          bitWidth: Number(localStorage.getItem('lastBitWidth') ?? 128),
          lastValidHex: null,
          cols: 16,
          errorMsg: '',
          hoveredCharIndex: null,
          isDarkTheme: true,
        };
      },
      mounted() {
        // Load theme preference
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
          this.isDarkTheme = false;
          document.body.classList.add('light-theme');
        } else {
          this.isDarkTheme = true;
          document.body.classList.remove('light-theme');
        }
      },
      computed: {
        hexLength() {
          return this.bitWidth / 4;
        },
        inputPlaceholder() {
          return `Enter ${this.hexLength} hex digits (${this.bitWidth} bits)`;
        },
        cleanHex() {
          let hex = this.hexInput.trim().replace(/\s+/g, '').toUpperCase();

          if (hex === '') {
            hex = '0';
          }

          const maxLen = this.hexLength;
          const pattern = new RegExp(`^[0-9A-F]{1,${maxLen}}$`);

          if (!pattern.test(hex)) {
            this.errorMsg = `Invalid hex: please use only 0-9 and A-F (max ${maxLen} characters)`;
            if (this.lastValidHex !== null) {
              hex = this.lastValidHex;
            } else {
              hex = '0';
            }
          } else {
            this.errorMsg = '';
            this.lastValidHex = hex;
          }

          return hex.padStart(maxLen, '0');
        },
        binary() {
          let binary = '';
          for (let char of this.cleanHex) {
            const nibble = parseInt(char, 16);
            binary += nibble.toString(2).padStart(4, '0');
          }
          return binary;
        },
        bitRows() {
          const rows = [];
          const totalBits = this.bitWidth;
          const rowCount = Math.ceil(totalBits / this.cols);

          for (let r = 0; r < rowCount; r++) {
            const highBit = this.bitWidth - 1 - r * this.cols;
            const lowBit = Math.max(0, highBit - this.cols + 1);
            const bits = [];
            for (let c = 0; c < this.cols; c++) {
              const bitIndex = r * this.cols + c;
              if (bitIndex < totalBits) {
                bits.push(this.binary[bitIndex]);
              } else {
                bits.push('0');
              }
            }
            rows.push({
              label: highBit + '-' + lowBit,
              bits: bits
            });
          }
          return rows;
        },
        cArrayText() {
          const bytes = [];
          const byteCount = this.hexLength / 2;
          for (let i = 0; i < byteCount * 2; i += 2) {
            bytes.push('0x' + this.cleanHex.slice(i, i + 2).toLowerCase());
          }
          if (this.endian === 'little') {
            bytes.reverse();
          }
          return '{' + bytes.join(', ') + '}';
        }
      },
      watch: {
        hexInput(newVal) {
          localStorage.setItem('lastHexInput', newVal);
        },
        endian(newVal) {
          localStorage.setItem('lastEndian', newVal);
        },
        bitWidth(newVal) {
          localStorage.setItem('lastBitWidth', newVal);
          if (this.hexInput.length > this.hexLength) {
            this.hexInput = this.hexInput.slice(0, this.hexLength);
          }
        }
      },
      methods: {
        toggleTheme() {
          this.isDarkTheme = !this.isDarkTheme;
          if (this.isDarkTheme) {
            document.body.classList.remove('light-theme');
            localStorage.setItem('theme', 'dark');
          } else {
            document.body.classList.add('light-theme');
            localStorage.setItem('theme', 'light');
          }
        },
        setCookie(name, value, days) {
          const d = new Date();
          d.setTime(d.getTime() + days * 24 * 60 * 60 * 1000);
          document.cookie = name + '=' + encodeURIComponent(value) + ';expires=' + d.toUTCString() + ';path=/;SameSite=Lax';
        },
        getCookie(name) {
          const prefix = name + '=';
          const parts = document.cookie.split(';');
          for (let p of parts) {
            p = p.trim();
            if (p.startsWith(prefix)) return decodeURIComponent(p.substring(prefix.length));
          }
          return null;
        }
      }
    }).mount('#app');
  </script>
</body>

</html>
